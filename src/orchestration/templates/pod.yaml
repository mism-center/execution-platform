---
# MISM Execution Platform — Pod manifest template
# Used as the pod template spec inside a K8s Job.
apiVersion: v1
kind: Pod
metadata:
  name: {{ system.full_name }}
  labels:
    name: {{ system.full_name }}
    username: {{ system.username }}
    app-name: {{ system.app_name }}
    executor: mism-exec
    mism-guid: {{ system.identifier }}
spec:
  restartPolicy: Never
  enableServiceLinks: false
{% if system.service_account %}
  serviceAccountName: {{ system.service_account }}
{% endif %}
{% if system.security_context %}
  securityContext:
  {% if system.security_context.get("run_as_user") %}
    runAsUser: {{ system.security_context["run_as_user"] | int }}
  {% endif %}
  {% if system.security_context.get("run_as_group") %}
    runAsGroup: {{ system.security_context["run_as_group"] | int }}
  {% endif %}
  {% if system.security_context.get("fs_group") %}
    fsGroup: {{ system.security_context["fs_group"] | int }}
  {% endif %}
{% endif %}
{% set has_gpu = system.containers | selectattr("limits.gpus") | list | length > 0 %}
{% if has_gpu %}
  tolerations:
  - key: "{{ system.gpu_resource_name }}"
    operator: "Exists"
    effect: "NoSchedule"
{% endif %}
  containers:
{% for container in system.containers %}
  - name: {{ container.name }}
    image: {{ container.image }}
{% if container.command %}
    command: {{ container.command }}
{% endif %}
    env:
{% for key, value in container.env.items() %}
    - name: {{ key }}
      value: "{{ value }}"
{% endfor %}
    - name: MISM_GUID
      value: "{{ system.identifier }}"
{% if container.limits.cpus or container.limits.memory or container.limits.gpus %}
    resources:
      limits:
{% if container.limits.cpus %}
        cpu: "{{ container.limits.cpus }}"
{% endif %}
{% if container.limits.memory %}
        memory: "{{ container.limits.memory }}"
{% endif %}
{% if container.limits.gpus %}
        {{ system.gpu_resource_name }}: {{ container.limits.gpus }}
{% endif %}
{% if container.limits.ephemeral_storage %}
        ephemeral-storage: "{{ container.limits.ephemeral_storage }}"
{% endif %}
{% if container.requests.cpus or container.requests.memory %}
      requests:
{% if container.requests.cpus %}
        cpu: "{{ container.requests.cpus }}"
{% endif %}
{% if container.requests.memory %}
        memory: "{{ container.requests.memory }}"
{% endif %}
{% endif %}
{% endif %}
{% if container.volumes %}
    volumeMounts:
{% for vol in container.volumes %}
    - name: {{ vol.name }}
      mountPath: {{ vol.mount_path }}
{% if vol.sub_path %}
      subPath: {{ vol.sub_path }}
{% endif %}
      readOnly: {{ vol.read_only | lower }}
{% endfor %}
{% endif %}
{% endfor %}
{%- set all_volumes = system.containers | map(attribute="volumes") | sum(start=[]) | list %}
{%- if all_volumes %}
  volumes:
{%- set ns = namespace(seen=[]) %}
{%- for vol in all_volumes %}
{%- if vol.name not in ns.seen %}
  - name: {{ vol.name }}
    persistentVolumeClaim:
      claimName: {{ vol.pvc_name }}
{%- set ns.seen = ns.seen + [vol.name] %}
{%- endif %}
{%- endfor %}
{% endif %}
